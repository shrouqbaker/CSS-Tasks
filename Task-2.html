<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="task2.css">
    <title>Task 2</title>
</head>

<body>
    <div class="container-linkedin">

        <img width="200px" style="margin-left: 5px;"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7kUZnDXRiwm-_qVkKYenCsNZ3dNnQoRIL-d3lHyAM7Q&s"
            alt="logo">
        <div class="position">
            <div class="card-linkedin">
                <h2 style="margin-bottom: 4px;">Sign in</h2>
                <span style="margin-bottom: 18px;  font-size: 15px;">Stay updated on your professional world</span>
                <input type="email" class="input-linkedin" placeholder="Email or Phone">
                <input type="password" class="input-linkedin" placeholder="Password">
                <a href="#" style="color: blue; text-decoration: none;">Forget password?</a>
                <button class="button-linkedin">Sign in</button>
                <div class="divider">
                    <hr>
                    <span>or</span>
                    <hr>
                </div>
                <button style="color: gray; background-color: white; border: 2px solid gray;"
                    class="button-linkedin">Sign
                    in with Apple</button>

            </div>
            <p>New to Linkedin? <a style="color: blue; text-decoration: none;">Join now</a></p>

        </div>

    </div>

    <div class="container-scratch">
        <header class="header-scratch">
            <h2>scratch</h2>
            <div>
                <a class="a-scratch" href="#">Signup</a>
                <a class="a-scratch" href="#">Login</a>      
            </div>
        </header>
        <div class="card-scratch">
            <label>Email</label>
            <input class="input-scratch" type="email">
            <label>password</label>
            <input class="input-scratch" type="password">
            <button class="button-scratch">Login</button>

        </div>

    </div>

    <div class="container-login">
        <div class="card-login">
            <h1>Login</h1>
            <input class="input-login" type="text" placeholder="Email">
            <input class="input-login" type="password" placeholder="Password">
            
            <div style="text-align: start; width: 95%;">
                <input type="checkbox">
                <label>Show Password</label>
            </div>
            <button class="button-login">Sign in</button>
            <div>Forgot <a class="a-login">Username / Password?</a></div>
            <div>Don't have an account <a class="a-login">Sign up</a></div>

        </div>


    </div>

    <div class="container-userlogin">
        <div class="card-userlogin">
            <h1>User Login</h1>
            <label class="label-userlogin">UserName</label>
            <input class="input-userlogin" type="email" >

            <label class="label-userlogin">Password</label>
            <input class="input-userlogin" type="password">

            <button class="button-userlogin">Login</button>
            <span>Forget Password?</span>

        </div>

    </div>

</body>

</html>
